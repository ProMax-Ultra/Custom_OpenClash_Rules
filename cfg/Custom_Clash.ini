;Custom_OpenClash_Rules
;全分组防 DNS 泄漏订阅转换模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<建议>搭配本项目配套设置，实现最佳化的 OpenClash 使用效果！
;设置方案：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果


;本项目收录的直连规则
ruleset=⬆️ 直连,https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Direct_Domain.yaml
ruleset=⬆️ 直连,https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Direct_Classical_IP.yaml
;本项目收录的代理规则
ruleset=🧱 手动选择,https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Proxy_Domain.yaml
ruleset=🧱 手动选择,https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Proxy_Classical_IP.yaml
;谷歌在国内可用的域名强制直连
ruleset=⬆️ 直连,[]GEOSITE,google-cn
;国内游戏域名强制直连
ruleset=⬆️ 直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 地址强制直连
ruleset=⬆️ 直连,https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Steam_CDN_Classical.yaml
;各大游戏平台下载域名强制直连
ruleset=⬆️ 直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名强制直连
ruleset=⬆️ 直连,[]GEOSITE,category-public-tracker
ruleset=✈️ Telegram,[]GEOSITE,telegram
ruleset=🎶 TikTok,[]GEOSITE,tiktok
;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=📱 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🖥️ GitHub,[]GEOSITE,github
ruleset=📺 YouTube,[]GEOSITE,youtube
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Game.list
ruleset=🎮 游戏平台,[]GEOSITE,category-games
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=🛜 测速工具,[]GEOSITE,category-speedtest
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=🧱 手动选择,[]GEOSITE,gfw
ruleset=✈️ Telegram,[]GEOIP,telegram,no-resolve
ruleset=📱 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=📱 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=⬆️ 直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=⬆️ 直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=⏺️ 非标端口,clash-classic:https://raw.githubusercontent.com/ProMax-Ultra/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Port_Direct.yaml
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
;节点地区分组参考本项目推荐机场而设立
;custom_proxy_group=🥇 临时节点`select`(流媒体)
custom_proxy_group=🇭🇰 香港节点`url-test`!!PROVIDER=sub1`(香港)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`!!PROVIDER=sub1`(新加坡)`https://cp.cloudflare.com/generate_204`300,,50
